<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #3a3330; --ink-light: #7a6e68; --paper: #faf8f4;
  --shadow-sm: 0 2px 16px rgba(58,51,48,0.06), 0 1px 3px rgba(58,51,48,0.04);
  --shadow-md: 0 4px 24px rgba(58,51,48,0.10), 0 2px 6px rgba(58,51,48,0.06);
  --pending-bg: linear-gradient(135deg,#f2f7fd 0%,#f7f4f0 100%);
  --pending-hdr: rgba(232,238,248,0.7);
  --bought-bg: linear-gradient(135deg,#f5f5f3 0%,#efefed 100%);
  --bought-hdr: rgba(240,240,238,0.7);
  --link-bg: linear-gradient(135deg,#eef5f2 0%,#f4f7f0 100%);
  --detail-bg: linear-gradient(135deg,#f2f7fd 0%,#f7f4f0 100%);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--paper);font-family:'Jost',sans-serif;font-weight:300;
  color:var(--ink);min-height:100vh;padding:40px 20px 80px;
  background-image:
    radial-gradient(ellipse at 10% 10%,rgba(242,230,216,0.4) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 80%,rgba(232,238,248,0.35) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(245,232,245,0.2) 0%,transparent 60%);
}
.page{max-width:680px;margin:0 auto;}
.view{display:block;} .view.hidden{display:none;}

/* ── HEADER ── */
header{text-align:center;margin-bottom:48px;padding-bottom:32px;position:relative;}
header::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:120px;height:2px;
  background:linear-gradient(90deg,transparent,var(--ink-light),transparent);opacity:0.4;
}
h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(2rem,5vw,2.8rem);letter-spacing:0.04em;color:var(--ink);line-height:1.1;
}
h1 em{font-style:italic;color:var(--ink-light);}
.subtitle{font-size:0.78rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-light);margin-top:8px;}

/* ── ITEM WRAPPER ── */
.items-wrapper{
  border-radius:18px;overflow:hidden;box-shadow:var(--shadow-sm);
  transition:box-shadow 0.3s;margin-bottom:24px;
}
.items-wrapper:hover{box-shadow:var(--shadow-md);}
.items-wrapper.s-pending{background:var(--pending-bg);}
.items-wrapper.s-bought{background:var(--bought-bg);}

.group-header{
  padding:15px 22px 13px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,0.5);
}
.s-pending .group-header{background:var(--pending-hdr);}
.s-bought .group-header{background:var(--bought-hdr);}
.group-title{
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;
  font-weight:400;letter-spacing:0.06em;flex:1;
}
.badge{
  font-size:0.7rem;letter-spacing:0.12em;font-weight:500;
  color:var(--ink-light);background:rgba(255,255,255,0.55);
  padding:2px 9px;border-radius:20px;
}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot-pending{background:#7090d0;} .dot-bought{background:#a0a0a0;}

/* ── ITEM ROW ── */
.item-row{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px 11px 22px;
  border-bottom:1px solid rgba(255,255,255,0.45);
  transition:background 0.2s;position:relative;
  animation:rowIn 0.35s ease both;
}
.item-row:last-child{border-bottom:none;}
.item-row:hover{background:rgba(255,255,255,0.45);}
.item-row:hover .item-row-actions{opacity:1;}
.item-row.bought{opacity:0.55;}

.item-check{
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid rgba(58,51,48,0.25);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.25s;background:rgba(255,255,255,0.6);cursor:pointer;
}
.item-check:hover{border-color:rgba(58,51,48,0.5);background:rgba(255,255,255,0.9);}
.item-row.bought .item-check{background:var(--ink);border-color:var(--ink);}
.item-check svg{width:10px;height:10px;stroke:white;stroke-width:2.5;fill:none;opacity:0;transition:opacity 0.2s;}
.item-row.bought .item-check svg{opacity:1;}

.item-row-content{flex:1;min-width:0;cursor:pointer;}
.item-row-name{font-size:0.9rem;line-height:1.5;transition:all 0.25s;}
.item-row.bought .item-row-name{text-decoration:line-through;color:var(--ink-light);}
.item-row-meta{font-size:0.72rem;color:var(--ink-light);margin-top:2px;font-style:italic;}

.item-row-actions{
  display:flex;align-items:center;gap:4px;
  opacity:0;transition:opacity 0.15s;flex-shrink:0;
}

/* ── ADD ROW ── */
.add-btn-row{
  display:flex;justify-content:flex-end;margin-top:4px;
  padding:0 0 4px;
}

/* ── BUTTONS ── */
.btn-icon{
  width:28px;height:28px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.7);color:var(--ink-light);
  cursor:pointer;font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,color 0.15s;flex-shrink:0;
}
.btn-icon:hover{background:#fff;color:var(--ink);}
.btn-icon.danger:hover{background:#fde8e8;color:#c04040;}
.btn-primary{
  background:var(--ink);color:white;border:none;border-radius:24px;
  padding:9px 22px;font-family:'Jost',sans-serif;font-size:0.8rem;
  font-weight:400;letter-spacing:0.1em;cursor:pointer;transition:opacity 0.15s;
}
.btn-primary:hover{opacity:0.82;}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
.btn-secondary{
  background:transparent;color:var(--ink-light);
  border:1px solid rgba(58,51,48,0.22);border-radius:24px;
  padding:9px 22px;font-family:'Jost',sans-serif;font-size:0.8rem;
  font-weight:400;letter-spacing:0.1em;cursor:pointer;transition:all 0.15s;
}
.btn-secondary:hover{border-color:var(--ink);color:var(--ink);}

/* ── STATES ── */
.loading-msg,.empty-msg,.error-msg{
  text-align:center;padding:36px 20px;
  color:var(--ink-light);font-style:italic;font-size:0.88rem;
}
.error-msg{color:#c04040;}
.spinner{
  display:inline-block;width:20px;height:20px;
  border:2px solid rgba(58,51,48,0.15);border-top-color:var(--ink-light);
  border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;
}

/* ── BACK BUTTON ── */
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:none;color:var(--ink-light);
  font-family:'Jost',sans-serif;font-size:0.8rem;letter-spacing:0.1em;
  cursor:pointer;margin-bottom:32px;padding:6px 14px 6px 10px;
  border-radius:20px;transition:background 0.15s,color 0.15s;
}
.back-btn:hover{background:rgba(255,255,255,0.8);color:var(--ink);}

/* ── DETAIL CARD ── */
.detail-card{
  background:var(--detail-bg);border-radius:18px;
  padding:24px 28px 22px;box-shadow:var(--shadow-sm);
  margin-bottom:32px;position:relative;
  animation:rowIn 0.4s ease both;
}
.detail-item-name{
  font-family:'Cormorant Garamond',serif;font-size:1.5rem;
  font-weight:400;letter-spacing:0.04em;line-height:1.2;
  padding-right:72px;
}
.detail-item-name.bought{text-decoration:line-through;color:var(--ink-light);}
.detail-meta{
  display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;
  font-size:0.78rem;color:var(--ink-light);
}
.detail-meta-tag{
  background:rgba(255,255,255,0.6);border-radius:12px;
  padding:3px 10px;display:flex;align-items:center;gap:5px;
}
.detail-notas{
  margin-top:14px;padding-top:14px;
  border-top:1px solid rgba(58,51,48,0.09);
  font-size:0.84rem;color:var(--ink-light);font-style:italic;line-height:1.7;
}
.detail-card-actions{position:absolute;top:18px;right:18px;display:flex;gap:6px;}

/* ── SECTION LABEL ── */
.section-label{
  font-family:'Cormorant Garamond',serif;font-size:1.2rem;
  font-weight:400;letter-spacing:0.06em;margin-bottom:14px;
  display:flex;align-items:center;gap:10px;
}

/* ── LINK CARD ── */
.links-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.link-card{
  background:var(--link-bg);border-radius:14px;
  padding:14px 18px;box-shadow:var(--shadow-sm);
  position:relative;transition:box-shadow 0.2s;
  animation:rowIn 0.35s ease both;
}
.link-card:hover{box-shadow:var(--shadow-md);}
.link-card:hover .link-card-actions{opacity:1;}
.link-card-actions{
  position:absolute;top:10px;right:10px;
  display:flex;gap:4px;opacity:0;transition:opacity 0.15s;
}
.link-card-row{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px;}
.link-loja{
  font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--ink-light);font-weight:500;
}
.link-modelo{font-size:0.88rem;font-weight:400;color:var(--ink);}
.link-valor{
  font-family:'Cormorant Garamond',serif;font-size:1.05rem;
  color:var(--ink);font-style:italic;margin-left:auto;
}
.link-url{
  display:inline-flex;align-items:center;gap:4px;
  font-size:0.76rem;color:var(--ink-light);text-decoration:none;
  border-bottom:1px solid rgba(58,51,48,0.15);
  transition:color 0.15s,border-color 0.15s;word-break:break-all;
}
.link-url:hover{color:var(--ink);border-color:var(--ink);}
.link-descricao{
  font-size:0.78rem;color:var(--ink-light);font-style:italic;
  margin-top:7px;line-height:1.6;
}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(58,51,48,0.3);
  backdrop-filter:blur(5px);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.hidden{display:none;}
.modal-box{
  background:var(--paper);border-radius:20px;padding:30px 26px;
  width:100%;max-width:460px;
  box-shadow:0 20px 60px rgba(58,51,48,0.18);
  animation:modalIn 0.25s ease;
}
.modal-title{
  font-family:'Cormorant Garamond',serif;font-size:1.4rem;
  font-weight:400;letter-spacing:0.04em;margin-bottom:22px;
}
.form-field{margin-bottom:16px;}
.form-label{
  display:block;font-size:0.7rem;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--ink-light);margin-bottom:6px;
}
.req{color:#c04040;margin-left:2px;}
.form-input,.form-textarea{
  width:100%;border:1px solid rgba(58,51,48,0.18);border-radius:10px;
  padding:9px 13px;font-family:'Jost',sans-serif;font-size:0.86rem;
  font-weight:300;color:var(--ink);background:rgba(255,255,255,0.7);
  outline:none;transition:border-color 0.15s,box-shadow 0.15s;
}
.form-input:focus,.form-textarea:focus{
  border-color:rgba(58,51,48,0.45);
  box-shadow:0 0 0 3px rgba(58,51,48,0.07);
}
.form-input.err{border-color:#c04040;}
.form-textarea{resize:vertical;min-height:76px;line-height:1.6;}
.field-err{font-size:0.71rem;color:#c04040;margin-top:4px;display:none;}
.field-err.show{display:block;}
.check-row{display:flex;align-items:center;gap:9px;cursor:pointer;}
.check-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--ink);}
.check-label{font-size:0.85rem;color:var(--ink-light);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;}

/* ── TOAST ── */
#toast-container{
  position:fixed;bottom:22px;right:22px;z-index:200;
  display:flex;flex-direction:column;gap:7px;pointer-events:none;
}
.toast{
  background:var(--ink);color:white;border-radius:10px;
  padding:9px 16px;font-size:0.8rem;font-weight:300;letter-spacing:0.06em;
  box-shadow:0 4px 16px rgba(58,51,48,0.22);animation:rowIn 0.25s ease;
}
.toast.ok{background:#4a7a4a;} .toast.err{background:#b03030;}

footer{
  text-align:center;margin-top:52px;font-size:0.7rem;
  letter-spacing:0.1em;color:var(--ink-light);opacity:0.55;font-style:italic;
}

/* ── ANIMATIONS ── */
@keyframes rowIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes modalIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="toast-container"></div>

<!-- ═══════════════════════════ LIST VIEW ═══════════════════════════ -->
<div id="view-list" class="view">
  <div class="page">
    <header>
      <p class="subtitle" id="list-subtitle">Lista de Compras</p>
      <h1>Lista de <em>Compras</em></h1>
    </header>
    <div id="items-area"></div>
    <footer>passe o mouse sobre um item para opções &nbsp;·&nbsp; clique no nome para ver os links</footer>
  </div>
</div>

<!-- ═══════════════════════════ DETAIL VIEW ═════════════════════════ -->
<div id="view-detail" class="view hidden">
  <div class="page">
    <button class="back-btn" id="btn-back">← voltar à lista</button>
    <div id="detail-content"></div>
    <footer>clique no link para abrir &nbsp;·&nbsp; passe o mouse para editar ou remover</footer>
  </div>
</div>

<!-- ═══════════════════════════ MODAL: ITEM ══════════════════════════ -->
<div class="modal-overlay hidden" id="modal-item">
  <div class="modal-box">
    <div class="modal-title" id="mi-title">Novo Item</div>
    <div class="form-field">
      <label class="form-label">Nome <span class="req">*</span></label>
      <input class="form-input" id="fi-nome" type="text" maxlength="200" placeholder="ex: Tênis esportivo">
      <div class="field-err" id="fe-nome">Campo obrigatório.</div>
    </div>
    <div class="form-field">
      <label class="form-label">Quantidade <span class="req">*</span></label>
      <input class="form-input" id="fi-qtd" type="number" min="1" placeholder="1">
      <div class="field-err" id="fe-qtd">Informe uma quantidade válida (mínimo 1).</div>
    </div>
    <div class="form-field">
      <label class="form-label">Valor Estimado (R$)</label>
      <input class="form-input" id="fi-valor" type="number" step="0.01" min="0" placeholder="0,00">
    </div>
    <div class="form-field">
      <label class="form-label">Notas</label>
      <textarea class="form-textarea" id="fi-notas" placeholder="Observações, detalhes, especificações…" maxlength="1000"></textarea>
    </div>
    <div class="form-field">
      <label class="check-row">
        <input type="checkbox" id="fi-comprado">
        <span class="check-label">Já comprado</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="mi-cancel">Cancelar</button>
      <button class="btn-primary" id="mi-save">Salvar</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ MODAL: LINK ══════════════════════════ -->
<div class="modal-overlay hidden" id="modal-link">
  <div class="modal-box">
    <div class="modal-title" id="ml-title">Novo Link</div>
    <div class="form-field">
      <label class="form-label">URL do Produto <span class="req">*</span></label>
      <input class="form-input" id="fl-link" type="url" placeholder="https://…">
      <div class="field-err" id="fe-link">Campo obrigatório.</div>
    </div>
    <div class="form-field">
      <label class="form-label">Loja <span class="req">*</span></label>
      <input class="form-input" id="fl-loja" type="text" maxlength="100" placeholder="ex: Amazon, Mercado Livre, Shopee…">
      <div class="field-err" id="fe-loja">Campo obrigatório.</div>
    </div>
    <div class="form-field">
      <label class="form-label">Valor (R$)</label>
      <input class="form-input" id="fl-valor" type="number" step="0.01" min="0" placeholder="0,00">
    </div>
    <div class="form-field">
      <label class="form-label">Modelo / Variação</label>
      <input class="form-input" id="fl-modelo" type="text" maxlength="200" placeholder="ex: Preto 42, 128 GB…">
    </div>
    <div class="form-field">
      <label class="form-label">Descrição</label>
      <textarea class="form-textarea" id="fl-desc" placeholder="Observações sobre este link…" maxlength="500"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="ml-cancel">Cancelar</button>
      <button class="btn-primary" id="ml-save">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SB_URL = 'https://cfyqkkpharbibkutatup.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmeXFra3BoYXJiaWJrdXRhdHVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDg1OTMsImV4cCI6MjA5NTM4NDU5M30.gVwCSgqw3vUrs3O-45qY0V9n4GL6daS6fwngpiQxCkw';
const H = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

// ── API HELPERS ───────────────────────────────────────────────────────────────
async function req(method, table, qs, body) {
  const url = `${SB_URL}/rest/v1/${table}${qs ? '?' + qs : ''}`;
  const opts = { method, headers: { ...H } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error((await res.json().catch(() => ({ message: res.statusText }))).message);
  if (res.status === 204) return null;
  return res.json();
}

const db = {
  itens: {
    list:   ()     => req('GET',    'itens', 'select=*&order=created_at.asc'),
    get:    id     => req('GET',    'itens', `select=*&id=eq.${id}`).then(r => r[0]),
    create: data   => req('POST',   'itens', null, data).then(r => r[0]),
    update: (id,d) => req('PATCH',  'itens', `id=eq.${id}`, d).then(r => r[0]),
    remove: id     => req('DELETE', 'itens', `id=eq.${id}`),
  },
  links: {
    list:   iid    => req('GET',    'links', `select=*&item_id=eq.${iid}&order=created_at.asc`),
    create: data   => req('POST',   'links', null, data).then(r => r[0]),
    update: (id,d) => req('PATCH',  'links', `id=eq.${id}`, d).then(r => r[0]),
    remove: id     => req('DELETE', 'links', `id=eq.${id}`),
  }
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentItemId = null;
let iModalMode = 'create', iEditId = null;
let lModalMode = 'create', lEditId = null;

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  const c = document.getElementById('toast-container');
  c.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.3s,transform 0.3s';
    el.style.opacity = '0'; el.style.transform = 'translateY(6px)';
    setTimeout(() => el.remove(), 320);
  }, 2800);
}

// ── ESCAPE HTML ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtBRL(v) { return 'R$\u00a0' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

// ── ROUTING ───────────────────────────────────────────────────────────────────
function goList()   { location.hash = '';           renderList(); }
function goDetail(id) { location.hash = 'item/' + id; renderDetail(id); }

function handleRoute() {
  const h = location.hash.replace('#','');
  document.getElementById('view-list').classList.toggle('hidden', h.startsWith('item/'));
  document.getElementById('view-detail').classList.toggle('hidden', !h.startsWith('item/'));
  if (h.startsWith('item/')) {
    const id = parseInt(h.replace('item/',''));
    if (!isNaN(id)) { currentItemId = id; renderDetail(id); }
  } else {
    currentItemId = null; renderList();
  }
}
window.addEventListener('popstate', handleRoute);
document.getElementById('btn-back').addEventListener('click', () => { history.back(); });

// ── LIST VIEW ─────────────────────────────────────────────────────────────────
async function renderList() {
  const area = document.getElementById('items-area');
  area.innerHTML = '<div class="loading-msg"><span class="spinner"></span>Carregando itens…</div>';
  try {
    const items = await db.itens.list();
    area.innerHTML = '';

    const pending = items.filter(x => !x.comprado);
    const bought  = items.filter(x => x.comprado);

    if (!items.length) {
      area.innerHTML = '<div class="empty-msg">Nenhum item na lista ainda.<br>Adicione o primeiro!</div>';
    } else {
      if (pending.length) buildGroup(area, pending, 'Pendentes', 'pending');
      if (bought.length)  buildGroup(area, bought,  'Comprados', 'bought');
    }

    const row = document.createElement('div');
    row.className = 'add-btn-row';
    row.innerHTML = '<button class="btn-primary" id="btn-new-item">+ Novo Item</button>';
    area.appendChild(row);
    document.getElementById('btn-new-item').addEventListener('click', () => openItemModal('create'));

    document.getElementById('list-subtitle').textContent =
      'Atualizada em ' + new Date().toLocaleDateString('pt-BR', { day:'numeric', month:'long', year:'numeric' });
  } catch(e) {
    area.innerHTML = `<div class="error-msg">Erro ao carregar: ${esc(e.message)}</div>`;
  }
}

function buildGroup(container, items, title, cls) {
  const wrap = document.createElement('div');
  wrap.className = `items-wrapper s-${cls}`;
  wrap.innerHTML = `
    <div class="group-header">
      <div class="dot dot-${cls}"></div>
      <div class="group-title">${title}</div>
      <div class="badge">${items.length} item${items.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="group-list"></div>
  `;
  container.appendChild(wrap);
  const list = wrap.querySelector('.group-list');
  items.forEach((item, i) => {
    const el = makeItemRow(item);
    el.style.animationDelay = (i * 0.04) + 's';
    list.appendChild(el);
  });
}

function makeItemRow(item) {
  const div = document.createElement('div');
  div.className = 'item-row' + (item.comprado ? ' bought' : '');

  let meta = [];
  if (item.quantidade) meta.push(item.quantidade + 'x');
  if (item.valor_estimado) meta.push(fmtBRL(item.valor_estimado));
  if (item.notas) meta.push(item.notas.length > 55 ? item.notas.substring(0,55) + '…' : item.notas);

  div.innerHTML = `
    <div class="item-check" title="${item.comprado ? 'Marcar como pendente' : 'Marcar como comprado'}">
      <svg viewBox="0 0 12 10"><polyline points="1,5 4.5,9 11,1"/></svg>
    </div>
    <div class="item-row-content">
      <div class="item-row-name">${esc(item.nome)}</div>
      ${meta.length ? `<div class="item-row-meta">${esc(meta.join(' · '))}</div>` : ''}
    </div>
    <div class="item-row-actions">
      <button class="btn-icon" data-a="edit"   title="Editar">✎</button>
      <button class="btn-icon danger" data-a="del" title="Remover">✕</button>
    </div>
  `;

  div.querySelector('.item-check').addEventListener('click', async e => {
    e.stopPropagation();
    try {
      await db.itens.update(item.id, { comprado: !item.comprado });
      toast(item.comprado ? 'Marcado como pendente.' : 'Marcado como comprado!', 'ok');
      renderList();
    } catch(err) { toast('Erro: ' + err.message, 'err'); }
  });

  div.querySelector('.item-row-content').addEventListener('click', () => goDetail(item.id));

  div.querySelector('[data-a="edit"]').addEventListener('click', e => {
    e.stopPropagation(); openItemModal('edit', item);
  });
  div.querySelector('[data-a="del"]').addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm(`Remover "${item.nome}" e todos os seus links?`)) return;
    try {
      await db.itens.remove(item.id);
      toast('Item removido.', 'ok'); renderList();
    } catch(err) { toast('Erro: ' + err.message, 'err'); }
  });

  return div;
}

// ── DETAIL VIEW ───────────────────────────────────────────────────────────────
async function renderDetail(itemId) {
  const content = document.getElementById('detail-content');
  content.innerHTML = '<div class="loading-msg"><span class="spinner"></span>Carregando…</div>';
  try {
    const [item, links] = await Promise.all([db.itens.get(itemId), db.links.list(itemId)]);
    if (!item) throw new Error('Item não encontrado.');

    let tags = '';
    if (item.quantidade)    tags += `<span class="detail-meta-tag">📦 ${esc(String(item.quantidade))}x</span>`;
    if (item.valor_estimado) tags += `<span class="detail-meta-tag">💰 ${fmtBRL(item.valor_estimado)}</span>`;
    if (item.comprado)       tags += `<span class="detail-meta-tag">✓ Comprado</span>`;

    content.innerHTML = `
      <header style="margin-bottom:28px;padding-bottom:24px;">
        <p class="subtitle">${item.comprado ? 'Item comprado' : 'Item pendente'}</p>
        <h1 style="${item.comprado ? 'text-decoration:line-through;color:var(--ink-light)' : ''}">${esc(item.nome)}</h1>
      </header>

      <div class="detail-card">
        <div class="detail-card-actions">
          <button class="btn-icon" id="btn-edit-item"   title="Editar item">✎</button>
          <button class="btn-icon danger" id="btn-del-item" title="Remover item">✕</button>
        </div>
        ${tags ? `<div class="detail-meta">${tags}</div>` : '<div class="detail-meta"><span style="font-style:italic;opacity:0.6">sem informações adicionais</span></div>'}
        ${item.notas ? `<div class="detail-notas">${esc(item.notas)}</div>` : ''}
      </div>

      <div class="section-label">
        Links Encontrados
        <span class="badge">${links.length} link${links.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="links-grid" id="links-grid">
        ${links.length === 0 ? '<div class="empty-msg" style="padding:16px 0 8px">Nenhum link cadastrado ainda.</div>' : ''}
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:4px;">
        <button class="btn-primary" id="btn-new-link">+ Novo Link</button>
      </div>
    `;

    document.getElementById('btn-edit-item').addEventListener('click', () => openItemModal('edit', item));
    document.getElementById('btn-del-item').addEventListener('click', async () => {
      if (!confirm(`Remover "${item.nome}" e todos os links?`)) return;
      try {
        await db.itens.remove(itemId);
        toast('Item removido.', 'ok'); goList();
      } catch(err) { toast('Erro: ' + err.message, 'err'); }
    });
    document.getElementById('btn-new-link').addEventListener('click', () => openLinkModal('create'));

    const grid = document.getElementById('links-grid');
    links.forEach((lk, i) => {
      const el = makeLinkCard(lk);
      el.style.animationDelay = (i * 0.05) + 's';
      grid.appendChild(el);
    });
  } catch(e) {
    content.innerHTML = `<div class="error-msg">Erro: ${esc(e.message)}</div>`;
  }
}

function makeLinkCard(lk) {
  const div = document.createElement('div');
  div.className = 'link-card';

  let domain = lk.link;
  try { domain = new URL(lk.link).hostname.replace(/^www\./,''); } catch {}

  div.innerHTML = `
    <div class="link-card-actions">
      <button class="btn-icon" data-a="edit" title="Editar link">✎</button>
      <button class="btn-icon danger" data-a="del" title="Remover link">✕</button>
    </div>
    <div class="link-card-row">
      <span class="link-loja">${esc(lk.loja)}</span>
      ${lk.modelo ? `<span class="link-modelo">${esc(lk.modelo)}</span>` : ''}
      ${lk.valor  ? `<span class="link-valor">${fmtBRL(lk.valor)}</span>` : ''}
    </div>
    <a class="link-url" href="${esc(lk.link)}" target="_blank" rel="noopener noreferrer">
      ↗ ${esc(domain)}
    </a>
    ${lk.descricao ? `<div class="link-descricao">${esc(lk.descricao)}</div>` : ''}
  `;

  div.querySelector('[data-a="edit"]').addEventListener('click', e => { e.stopPropagation(); openLinkModal('edit', lk); });
  div.querySelector('[data-a="del"]').addEventListener('click', async e => {
    e.stopPropagation();
    if (!confirm('Remover este link?')) return;
    try {
      await db.links.remove(lk.id);
      toast('Link removido.', 'ok'); renderDetail(currentItemId);
    } catch(err) { toast('Erro: ' + err.message, 'err'); }
  });

  return div;
}

// ── MODAL: ITEM ───────────────────────────────────────────────────────────────
function openItemModal(mode, item) {
  iModalMode = mode; iEditId = item?.id ?? null;
  document.getElementById('mi-title').textContent = mode === 'create' ? 'Novo Item' : 'Editar Item';
  document.getElementById('fi-nome').value    = item?.nome ?? '';
  document.getElementById('fi-qtd').value     = item?.quantidade ?? '';
  document.getElementById('fi-valor').value   = item?.valor_estimado ?? '';
  document.getElementById('fi-notas').value   = item?.notas ?? '';
  document.getElementById('fi-comprado').checked = item?.comprado ?? false;
  clearErr(['fi-nome','fi-qtd']);
  document.getElementById('modal-item').classList.remove('hidden');
  setTimeout(() => document.getElementById('fi-nome').focus(), 60);
}
function closeItemModal() { document.getElementById('modal-item').classList.add('hidden'); }

async function saveItem() {
  clearErr(['fi-nome','fi-qtd']);
  const nome = document.getElementById('fi-nome').value.trim();
  const qtd  = document.getElementById('fi-qtd').value;
  let valid = true;
  if (!nome) { setErr('fi-nome','fe-nome'); valid = false; }
  if (!qtd || parseInt(qtd) < 1) { setErr('fi-qtd','fe-qtd'); valid = false; }
  if (!valid) return;

  const data = {
    nome,
    quantidade: parseInt(qtd),
    valor_estimado: document.getElementById('fi-valor').value || null,
    notas: document.getElementById('fi-notas').value.trim() || null,
    comprado: document.getElementById('fi-comprado').checked,
  };

  const btn = document.getElementById('mi-save');
  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    if (iModalMode === 'create') { await db.itens.create(data); toast('Item adicionado!', 'ok'); }
    else                         { await db.itens.update(iEditId, data); toast('Item atualizado!', 'ok'); }
    closeItemModal();
    if (currentItemId) renderDetail(currentItemId); else renderList();
  } catch(e) { toast('Erro: ' + e.message, 'err'); }
  finally { btn.disabled = false; btn.textContent = 'Salvar'; }
}

// ── MODAL: LINK ───────────────────────────────────────────────────────────────
function openLinkModal(mode, lk) {
  lModalMode = mode; lEditId = lk?.id ?? null;
  document.getElementById('ml-title').textContent = mode === 'create' ? 'Novo Link' : 'Editar Link';
  document.getElementById('fl-link').value  = lk?.link  ?? '';
  document.getElementById('fl-loja').value  = lk?.loja  ?? '';
  document.getElementById('fl-valor').value = lk?.valor ?? '';
  document.getElementById('fl-modelo').value= lk?.modelo ?? '';
  document.getElementById('fl-desc').value  = lk?.descricao ?? '';
  clearErr(['fl-link','fl-loja']);
  document.getElementById('modal-link').classList.remove('hidden');
  setTimeout(() => document.getElementById('fl-link').focus(), 60);
}
function closeLinkModal() { document.getElementById('modal-link').classList.add('hidden'); }

async function saveLink() {
  clearErr(['fl-link','fl-loja']);
  const link = document.getElementById('fl-link').value.trim();
  const loja = document.getElementById('fl-loja').value.trim();
  let valid = true;
  if (!link) { setErr('fl-link','fe-link'); valid = false; }
  if (!loja) { setErr('fl-loja','fe-loja'); valid = false; }
  if (!valid) return;

  const btn = document.getElementById('ml-save');
  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    if (lModalMode === 'create') {
      await db.links.create({
        item_id: currentItemId, link, loja,
        valor:    document.getElementById('fl-valor').value  || null,
        modelo:   document.getElementById('fl-modelo').value.trim() || null,
        descricao:document.getElementById('fl-desc').value.trim()   || null,
      });
      toast('Link adicionado!', 'ok');
    } else {
      await db.links.update(lEditId, {
        link, loja,
        valor:    document.getElementById('fl-valor').value  || null,
        modelo:   document.getElementById('fl-modelo').value.trim() || null,
        descricao:document.getElementById('fl-desc').value.trim()   || null,
      });
      toast('Link atualizado!', 'ok');
    }
    closeLinkModal();
    renderDetail(currentItemId);
  } catch(e) { toast('Erro: ' + e.message, 'err'); }
  finally { btn.disabled = false; btn.textContent = 'Salvar'; }
}

// ── FORM HELPERS ──────────────────────────────────────────────────────────────
function setErr(inputId, errId) {
  document.getElementById(inputId).classList.add('err');
  document.getElementById(errId).classList.add('show');
}
function clearErr(ids) {
  ids.forEach(id => {
    document.getElementById(id).classList.remove('err');
    const e = document.getElementById(id.replace('fi-','fe-').replace('fl-','fe-'));
    if (e) e.classList.remove('show');
  });
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('mi-cancel').addEventListener('click', closeItemModal);
document.getElementById('mi-save').addEventListener('click', saveItem);
document.getElementById('ml-cancel').addEventListener('click', closeLinkModal);
document.getElementById('ml-save').addEventListener('click', saveLink);

// Close modal on overlay click
document.getElementById('modal-item').addEventListener('click', e => { if (e.target===e.currentTarget) closeItemModal(); });
document.getElementById('modal-link').addEventListener('click', e => { if (e.target===e.currentTarget) closeLinkModal(); });

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeItemModal(); closeLinkModal(); }
});
document.getElementById('fi-nome').addEventListener('keydown', e => { if (e.key==='Enter') saveItem(); });
document.getElementById('fl-loja').addEventListener('keydown', e => { if (e.key==='Enter') saveLink(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
handleRoute();
</script>
</body>
</html>
